---
layout: default
---

<h1 class="post-title">{{site.posts.first.title | markdownify}}</h1>
<p class="meta">{{ site.posts.first.date | date: "%A, %B %e, %Y" }}</p>

{{ site.posts.first.content }}

{% for post in site.posts offset:1 limit:1 %}
<div class="single-pagination">
  <div class="prev-link">
    <p class="title">Older</p>
    <p><a href="{{post.url}}">{{post.title}}</a></p>
  </div>
</div>
{% endfor %}
