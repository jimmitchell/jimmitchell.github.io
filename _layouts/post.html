---
layout: default
---

<h1 class="post-title">{{page.title}}</h1>
<p class="meta">{{ page.date | date: "%A, %B %e, %Y" }}</p>

{{ content }}

{% if site.posts.size > 1 %}
<div class="previous-next">
    {% if page.previous.url %}
    &laquo;&nbsp;<a class="previous" href="{{page.previous.url}}">{{page.previous.title}}</a>
    {% endif %}
    {% if page.next.url %}
      <a class="next" href="{{page.next.url}}">{{page.next.title}}</a>&nbsp;&raquo;
    {% endif %}
  </div>
  {% endif %}
